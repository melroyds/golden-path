name: ci

# Tier 0: runs on every push + PR. Fast, no secrets required.
# Tier 1+: uncomment the coverage threshold and the build job as the project matures.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # manual re-run from the Actions tab

jobs:
  quality:
    name: Lint · Type-check · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # PIN to the runtime you deploy on (e.g. the Node version on your
          # Lambda/container) so a green CI run implies it works in prod.
          node-version: '22'
          # Add `cache: 'npm'` once you have a package-lock.json.

      - name: Lint · Type-check · Test
        # Skips cleanly while this is still a bare template (no package.json), so
        # the template's own CI badge stays green. Lights up once you scaffold an app.
        run: |
          if [ ! -f package.json ]; then
            echo "::notice::No package.json yet — scaffold your app to enable lint/type-check/test."
            exit 0
          fi
          npm ci
          npm run lint
          npx tsc --noEmit          # HARD gate — no '|| true'
          npm test
          # Tier 1 — enforce a coverage floor once you have real users:
          # npm run test:coverage -- --coverage.thresholds.lines=50

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits too
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2

  # Tier 1 — prove it builds (and, if containerised, that it starts):
